<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>ブログ記事｜酒処あかり</title>
<link rel="icon" href="../../favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
  .post-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  .post-breadcrumb {
    font-size: 13px;
    opacity: .75;
    margin-bottom: 20px;
  }
  .post-breadcrumb a { text-decoration: underline; color: inherit; }
  .post-breadcrumb span { opacity: .6; margin: 0 4px; }
  .post-date {
    font-size: 13px;
    opacity: .7;
    margin-bottom: 8px;
  }
  .post-title {
    font-size: clamp(20px, 4vw, 30px);
    line-height: 1.4;
    margin: 0 0 20px;
  }
  .post-hero {
    width: 100%;
    max-width: 860px;
    border-radius: 12px;
    aspect-ratio: 16/9;
    object-fit: cover;
    margin-bottom: 28px;
    display: block;
  }
  .post-body {
    line-height: 1.95;
    font-size: 16px;
  }
  .post-body p { margin: 0 0 1.4em; }
  .post-body h2 {
    font-size: 20px;
    margin: 28px 0 12px;
    padding-left: 12px;
    border-left: 3px solid var(--primary);
  }
  .post-body h3 { font-size: 17px; margin: 20px 0 8px; }
  .post-body ul, .post-body ol { padding-left: 1.5em; margin-bottom: 16px; }
  .post-body li { margin-bottom: 6px; }
  .post-footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,.15);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .post-footer a { text-decoration: underline; color: inherit; font-size: 14px; }
  .post-footer span { opacity: .4; }
  .post-loading { text-align: center; padding: 80px 20px; opacity: .6; }
</style>
<meta property="og:type" content="article">
<meta property="og:site_name" content="酒処あかり">
<meta property="og:title" content="ブログ記事｜酒処あかり">
<meta property="og:url" content="https://sakedokoro-akari.com/blog/posts/">
<meta property="og:image" content="https://sakedokoro-akari.com/images/hero-akari-1.jpg">
<meta name="twitter:card" content="summary_large_image">
</head>

<body data-page="blog">
<div id="top"></div>
<div id="shared-header"></div>

<main id="main">
  <div class="post-wrap">

    <nav class="post-breadcrumb">
      <a href="../../index.html">トップ</a>
      <span>/</span>
      <a href="../index.html">ブログ・お知らせ</a>
      <span>/</span>
      <span id="bc-title">記事</span>
    </nav>

    <div id="post-content">
      <p class="post-loading">読み込み中…</p>
    </div>

  </div>

  <div id="shared-bottom"></div>
  <a href="#top" class="page-top" aria-label="ページの先頭へ戻る">＾</a>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../../common.js"></script>
<script>
(async () => {
  const params    = new URLSearchParams(location.search);
  const slug      = params.get('slug') || location.search.replace('?','');
  const contentEl = document.getElementById('post-content');
  const bcTitle   = document.getElementById('bc-title');

  function esc(s){
    return String(s ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
  function fmtDate(d){
    const m = String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}.${m[2]}.${m[3]}` : esc(d||'');
  }

  if (!slug) {
    contentEl.innerHTML = '<p>記事が見つかりませんでした。<br><a href="../index.html" style="text-decoration:underline">ブログ一覧へ</a></p>';
    return;
  }

  try {
    const res = await fetch('../posts.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('posts.json 読み込みエラー');
    const posts = (await res.json()).posts;

    const post = posts.find(p => p.slug === slug);
    if (!post) throw new Error('記事が見つかりません: ' + slug);

    document.title = `${post.title}｜酒処あかり`;
    document.querySelector('meta[name="description"]')
      ?.setAttribute('content', post.excerpt || '');
    if (bcTitle) bcTitle.textContent = post.title;

    // thumbnail or image → ../../images/xxx.jpg
    const rawImg = post.thumbnail || post.image || '';
    const imgSrc = rawImg
      ? rawImg.replace(/^\.\.\/images\//, '../../images/')
               .replace(/^\.\/images\//, '../../images/')
               .replace(/^images\//, '../../images/')
      : '';

    const imgHtml = imgSrc
      ? `<img src="${esc(imgSrc)}" alt="${esc(post.title)}" class="post-hero" loading="lazy">`
      : '';

    const rawBody = post.body || `<p>${esc(post.excerpt)}</p>`;
    const bodyHtml = (typeof marked !== "undefined" && !rawBody.trimStart().startsWith("<"))
      ? marked.parse(rawBody)
      : rawBody;

    contentEl.innerHTML = `
      <p class="post-date">${fmtDate(post.date)}</p>
      <h1 class="post-title">${esc(post.title)}</h1>
      ${imgHtml}
      <div class="post-body">${bodyHtml}</div>
      <div class="post-footer">
        <a href="../index.html">← ブログ一覧へ戻る</a>
        <span>|</span>
        <a href="../../index.html">トップへ</a>
      </div>
    `;

  } catch(e) {
    contentEl.innerHTML = `<p>エラー：${esc(e.message)}<br><a href="../index.html" style="text-decoration:underline">ブログ一覧へ</a></p>`;
    console.error(e);
  }
})();
</script>
</body>
</html>
