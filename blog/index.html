<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブログ・お知らせ｜酒処あかり</title>
<link rel="icon" href="../favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="酒処あかりからのお知らせ・ブログ。最新情報やおすすめ料理・イベント情報を掲載しています。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<link rel="canonical" href="https://akari-hakata.com/blog/">
</head>

<body data-page="blog">
<div id="top"></div>
<div id="shared-header"></div>

<main id="main">

  <section class="section is-inview blog-page" style="padding-top: 24px !important;">
    <div class="section-inner">
      <h1 class="page-title">ブログ・お知らせ</h1>
      <p class="page-lead">酒処あかりからの最新情報・おすすめ情報を掲載しています。</p>

      <div class="blog-list-grid" id="blog-all-grid">
        <article class="blog-card">
          <a href="../index.html">
            <div class="blog-body">
              <h3 class="blog-title">記事を読み込んでいます...</h3>
            </div>
          </a>
        </article>
      </div>
    </div>
  </section>

  <div id="shared-bottom"></div>
  <a href="#top" class="page-top" aria-label="ページの先頭へ戻る">＾</a>

</main>

<script src="../common.js"></script>
<script>
(function () {
  const grid = document.getElementById('blog-all-grid');
  if (!grid) return;

  function esc(s) {
    return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
  }
  function fmtDate(d) {
    const m = String(d || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}.${m[2]}.${m[3]}` : esc(d || '');
  }

  fetch('../blog/posts.json', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      const posts = data.posts ?? data;
      if (!Array.isArray(posts)) throw new Error();
      posts.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
      grid.innerHTML = '';
      if (posts.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:#999;">まだ記事がありません。</p>';
        return;
      }
      posts.forEach(p => {
        const img = p.image ? String(p.image) : '';
        const bg  = img ? `background-image:url('${esc(img)}');` : '';
        const el  = document.createElement('article');
        el.className = 'blog-card';
        el.innerHTML = `
          <a href="./posts/post.html?slug=${encodeURIComponent(p.slug)}">
            <div class="blog-image" style="${bg}"></div>
            <div class="blog-body">
              <time class="blog-date" datetime="${esc(p.date)}">${fmtDate(p.date)}</time>
              <h3 class="blog-title">${esc(p.title)}</h3>
              <p class="blog-excerpt">${esc(p.excerpt)}</p>
            </div>
          </a>`;
        grid.appendChild(el);
      });
    })
    .catch(() => {
      grid.innerHTML = '<p style="text-align:center;color:#999;">記事の読み込みに失敗しました。</p>';
    });
})();
</script>
</body>
</html>
